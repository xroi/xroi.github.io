<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ink8.html</title>
    <link rel="stylesheet" href="..\css\inks-style.css"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
</head>
<body>

<p style="color: aliceblue; text-align: center; font-size: x-small">
    נמאס לי
</p>
<p style="color: aliceblue; text-align: center; font-size: x-small">
    .מלקרוא לאליס הכחולה, כחולה
</p>
<p style="color: aliceblue; text-align: center; font-size: x-small">
    ,רק כי איבדתי את אליס
</p>
<p style="color: aliceblue; text-align: center; font-size: x-small">
    .במדרגות העגולות המתפתלות שלה
</p>
<p style="color: aliceblue; text-align: center; font-size: x-small">
    ,והקשבתי
</p>
<p style="color: aliceblue; text-align: center; font-size: x-small">
    ,לצחוק קליל ומקורי
</p>
<p style="color: aliceblue; text-align: center; font-size: x-small">
    ,שהרומנטיקה נגעלת
</p>
<p style="color: aliceblue; text-align: center; font-size: x-small">
    .עושה סיבוב, ומתנצלת, בפניו
</p>
<p style="color: aliceblue; text-align: center; font-size: x-small">
    ,אז למה
</p>
<p style="color: aliceblue; text-align: center; font-size: x-small">
    ,בראש מורד וחרישי
</p>
<p style="color: aliceblue; text-align: center; font-size: x-small">
    ,וצחוק כבד, שלא אישי
</p>
<p style="color: aliceblue; text-align: center; font-size: x-small">
    ?כתבתי שיר לאליס, רק עכשיו
</p>

</body>
</html>
